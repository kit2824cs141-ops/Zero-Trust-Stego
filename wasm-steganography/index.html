<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure, browser-based zero-trust image steganography tool. Hide text messages within the Least Significant Bits (LSB) of PNG images privately.">
    <title>WASM LSB Steganography - Secure Image Encoding</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --secondary-gradient: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
        }

        main {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin: 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-weight: 300;
            color: #94a3b8;
            margin-top: 0.5rem;
            font-size: 1.05rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="file"] {
            padding: 0.8rem;
            border-radius: 8px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        input[type="file"]:hover, input[type="file"]:focus {
            border-color: #6366f1;
            outline: none;
        }

        input[type="file"]::file-selector-button {
            border: none;
            background: #334155;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-right: 1rem;
            font-family: inherit;
            font-weight: 600;
        }

        input[type="file"]::file-selector-button:hover {
            background: #475569;
        }

        textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            padding: 1rem;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            resize: vertical;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }
        
        textarea::placeholder {
            color: #475569;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        button:hover::after {
            opacity: 1;
        }

        button:active {
            transform: scale(0.98);
        }

        #encode-btn {
            background: var(--primary-gradient);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        #encode-btn:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        #decode-btn {
            background: var(--secondary-gradient);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        #decode-btn:hover {
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
            transform: translateY(-2px);
        }

        .output-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .output-box {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .output-box h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .output-box h3.decoded-title::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.8);
        }
        
        .output-box h3.output-title::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3b82f6;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.8);
        }

        #decoded-message {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            color: #10b981;
            padding: 1rem;
            border-radius: 8px;
            min-height: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            position: relative;
        }
        
        #decoded-message:empty::before {
            content: 'Extracted text will appear here...';
            color: #475569;
            font-style: italic;
        }

        .image-preview-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 1rem;
        }

        #output-image {
            max-width: 100%;
            border-radius: 4px;
            display: none; /* hidden by default */
        }
        
        /* Show when it has a valid src (we will handle display property from JS as required, or rely on src presence) */
        #output-image[src]:not([src=""]) {
            display: block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #output-image[src]:not([src=""]) + .preview-placeholder {
            display: none;
        }

        .preview-placeholder {
            color: #475569;
            font-style: italic;
            font-size: 0.9rem;
            text-align: center;
        }

        .divider {
            height: 1px;
            width: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            border: none;
            margin: 0.5rem 0;
        }

        @media (max-width: 600px) {
            .action-buttons {
                flex-direction: column;
            }
            body {
                padding: 1rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>Zero-Trust Stego</h1>
            <p class="subtitle">Securely conceal cryptographic intel within image data.</p>
        </header>

        <section class="glass-card" aria-label="Input Configuration">
            <div class="input-group" style="margin-bottom: 1.5rem;">
                <label for="image-upload">1. Target PNG Image</label>
                <input type="file" id="image-upload" accept="image/png" aria-label="Upload Target PNG Image" />
            </div>
            
            <div class="input-group" style="margin-bottom: 2rem;">
                <label for="secret-message">2. Classified Payload</label>
                <textarea id="secret-message" placeholder="Type the confidential payload you wish to embed..." rows="4" aria-label="Secret text payload input"></textarea>
            </div>

            <div class="action-buttons">
                <button id="encode-btn" aria-label="Inject payload and Download Image">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Inject & Download
                </button>
                <button id="decode-btn" aria-label="Extract payload from Image">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
                    Extract Payload
                </button>
            </div>
        </section>

        <hr class="divider"/>

        <section class="output-section">
            <article class="glass-card output-box" aria-label="Extracted Payload Area">
                <h3 class="decoded-title">Extracted Intel</h3>
                <pre id="decoded-message" aria-live="polite"></pre>
            </article>
            
            <article class="glass-card output-box" aria-label="Visual Output Area">
                <h3 class="output-title">Steganographic Artifact Preview</h3>
                <div class="image-preview-container">
                    <img id="output-image" alt="Embedded artifact will appear here" aria-live="polite" />
                    <div class="preview-placeholder">Awaiting steganographic operations...</div>
                </div>
            </article>
        </section>
    </main>

    <!-- Core WASM Logic -->
    <script type="module" src="main.js"></script>
</body>
</html>
